<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-label="blessedrebus terminal profile card">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .small { font-size: 10px; }
      .body { font-size: 12px; }
      .title { font-size: 15px; font-weight: bold; }
      .muted { fill: #6c7086; }
      .faint { fill: #45475a; }
      .blue { fill: #89b4fa; }
      .purple { fill: #cba6f7; }
      .white { fill: #cdd6f4; }
      .pink { fill: #f38ba8; }
      .cyan { fill: #89dceb; }
      .teal { fill: #94e2d5; }
      .yellow { fill: #f9e2af; }
      .peach { fill: #fab387; }
      .ok { fill: #a6e3a1; }
      .info-c { fill: #89b4fa; }
      .warn { fill: #f9e2af; }
      .line { stroke: #313244; stroke-width: 1; fill: none; }
      a { text-decoration: none; }

      /* cursor blink */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 0.9s step-end infinite; animation-delay: 7.4s; opacity: 0; }

      /* fade in */
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

      /* slide in from left */
      @keyframes slidein {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* divider line draw */
      @keyframes drawline {
        from { stroke-dashoffset: 1100; }
        to   { stroke-dashoffset: 0; }
      }

      /* intro glitch */
      @keyframes introglitch {
        0%   { opacity: 0; transform: translate(0,0); }
        5%   { opacity: 0.95; transform: translate(-2px,1px); }
        10%  { opacity: 0.35; transform: translate(2px,-1px); }
        15%  { opacity: 0.9; transform: translate(-1px,-1px); }
        20%  { opacity: 0.25; transform: translate(3px,1px); }
        25%  { opacity: 0.85; transform: translate(-3px,0); }
        30%  { opacity: 0.2; transform: translate(2px,2px); }
        35%  { opacity: 0.75; transform: translate(-2px,-2px); }
        40%  { opacity: 0.15; transform: translate(1px,0); }
        45%  { opacity: 0.65; transform: translate(-1px,1px); }
        50%  { opacity: 0.08; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(0,0); }
      }

      @keyframes glitchbar {
        0%   { opacity: 0; transform: translateY(0); }
        8%   { opacity: 0.8; transform: translateY(-2px); }
        16%  { opacity: 0.15; transform: translateY(1px); }
        24%  { opacity: 0.7; transform: translateY(-1px); }
        32%  { opacity: 0.12; transform: translateY(2px); }
        40%  { opacity: 0.6; transform: translateY(-3px); }
        48%  { opacity: 0.08; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(0); }
      }

      .glitch-layer-1 {
        opacity: 0;
        animation: introglitch 5s steps(2, end) forwards;
      }

      .glitch-layer-2 {
        opacity: 0;
        animation: introglitch 3s steps(2, end) forwards;
        animation-delay: 1s;
      }

      .glitch-scan {
        opacity: 0;
        animation: glitchbar 5s steps(2, end) forwards;
      }

      /* typewriter chars */
      .tw-w { opacity:0; animation: fadein 0.05s forwards; animation-delay: 6.55s; }
      .tw-h { opacity:0; animation: fadein 0.05s forwards; animation-delay: 6.67s; }
      .tw-o { opacity:0; animation: fadein 0.05s forwards; animation-delay: 6.79s; }
      .tw-a { opacity:0; animation: fadein 0.05s forwards; animation-delay: 6.91s; }
      .tw-m { opacity:0; animation: fadein 0.05s forwards; animation-delay: 7.03s; }
      .tw-i { opacity:0; animation: fadein 0.05s forwards; animation-delay: 7.15s; }

      /* ASCII spinner */
      @keyframes sp0 { 0%,24%{opacity:1} 25%,100%{opacity:0} }
      @keyframes sp1 { 25%,49%{opacity:1} 0%,24%,50%,100%{opacity:0} }
      @keyframes sp2 { 50%,74%{opacity:1} 0%,49%,75%,100%{opacity:0} }
      @keyframes sp3 { 75%,100%{opacity:1} 0%,74%{opacity:0} }

      .spin0 { opacity:1; animation: sp0 0.5s step-end infinite; animation-delay: 2.5s; }
      .spin1 { opacity:0; animation: sp1 0.5s step-end infinite; animation-delay: 2.5s; }
      .spin2 { opacity:0; animation: sp2 0.5s step-end infinite; animation-delay: 2.5s; }
      .spin3 { opacity:0; animation: sp3 0.5s step-end infinite; animation-delay: 2.5s; }

      @keyframes spinnerout { 0%{opacity:1} 100%{opacity:0} }
      .spinner-grp     { opacity:0; animation: fadein 0.1s forwards; animation-delay: 2.4s; }
      .spinner-grp-out { animation: spinnerout 0.3s forwards; animation-delay: 4.9s; }

      /* boot lines */
      .b0  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.1s; }
      .b1  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.32s; }
      .b2  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.54s; }
      .b3  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.76s; }
      .b4  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.98s; }
      .b5  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.2s; }
      .b6  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.42s; }
      .b7  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.64s; }
      .b8  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.86s; }
      .b9  { opacity:0; animation: fadein 0.2s  forwards; animation-delay: 2.3s; }
      .b10 { opacity:0; animation: fadein 0.2s  forwards; animation-delay: 5.0s; }

      /* boot overlay */
      @keyframes bootout { 0%{opacity:1} 100%{opacity:0} }
      .boottext { animation: bootout 0.5s forwards; animation-delay: 5.6s; }

      /* prompt + content */
      .prompt-static { opacity:0; animation: fadein 0.3s forwards; animation-delay: 6.3s; }

      .sh-system   { opacity:0; animation: fadein 0.3s forwards; animation-delay: 7.5s; }
      .sh-focus    { opacity:0; animation: fadein 0.3s forwards; animation-delay: 9.1s; }
      .sh-other    { opacity:0; animation: fadein 0.3s forwards; animation-delay: 10.0s; }
      .sh-projects { opacity:0; animation: fadein 0.3s forwards; animation-delay: 10.9s; }

      .dl-system   { stroke-dasharray:1100; stroke-dashoffset:1100; animation: drawline 0.4s forwards; animation-delay: 7.6s; }
      .dl-focus    { stroke-dasharray:1100; stroke-dashoffset:1100; animation: drawline 0.4s forwards; animation-delay: 9.2s; }
      .dl-other    { stroke-dasharray:1100; stroke-dashoffset:1100; animation: drawline 0.4s forwards; animation-delay: 10.1s; }
      .dl-projects { stroke-dasharray:1100; stroke-dashoffset:1100; animation: drawline 0.4s forwards; animation-delay: 11.0s; }

      .r0  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.05s; }
      .r1  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.2s; }
      .r2  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.35s; }
      .r3  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.5s; }
      .r4  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.65s; }
      .r5  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.8s; }
      .r6  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 9.65s; }
      .r7  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 9.8s; }
      .r8  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 10.6s; }
      .r9  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 11.4s; }
      .r10 { opacity:0; animation: slidein 0.2s forwards; animation-delay: 11.55s; }
    </style>
  </defs>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="1099" height="679" rx="10" fill="transparent" stroke="#313244"/>

  <!-- header -->
  <rect x="1" y="1" width="1098" height="43" rx="10" fill="#161b22"/>
  <rect x="1" y="34" width="1098" height="10" fill="#161b22"/>
  <line x1="1" y1="44" x2="1099" y2="44" stroke="#30363d" stroke-width="1"/>

  <circle cx="21" cy="22" r="5.5" fill="#f85149"/>
  <circle cx="40" cy="22" r="5.5" fill="#d29922"/>
  <circle cx="59" cy="22" r="5.5" fill="#3fb950"/>

  <text x="550" y="27" text-anchor="middle" class="mono small" fill="#8b949e">blessedrebus / whoami</text>

  <!-- INTRO GLITCH -->
  <g>
    <g class="glitch-layer-1">
      <text x="39" y="90" class="mono small" fill="#f5c2e7">[  OK  ] Started kernel event logging daemon.</text>
      <text x="39" y="112" class="mono small" fill="#f5c2e7">[  OK  ] Reached target System Initialization.</text>
      <text x="39" y="134" class="mono small" fill="#cba6f7">[ INFO ] Loading catppuccin mocha colorscheme...</text>
      <text x="39" y="156" class="mono small" fill="#f5c2e7">[  OK  ] Mounted /home/blessedrebus.</text>
      <text x="39" y="178" class="mono small" fill="#f5c2e7">[  OK  ] Started zsh session manager.</text>
    </g>

    <g class="glitch-layer-2">
      <text x="41" y="89" class="mono small" fill="#89dceb">[  OK  ] Started kernel event logging daemon.</text>
      <text x="41" y="111" class="mono small" fill="#89dceb">[  OK  ] Reached target System Initialization.</text>
      <text x="41" y="133" class="mono small" fill="#89b4fa">[ INFO ] Loading catppuccin mocha colorscheme...</text>
      <text x="41" y="155" class="mono small" fill="#89dceb">[  OK  ] Mounted /home/blessedrebus.</text>
      <text x="41" y="177" class="mono small" fill="#89dceb">[  OK  ] Started zsh session manager.</text>
    </g>

    <g class="glitch-scan">
      <rect x="24" y="82" width="760" height="10" fill="rgba(203,166,247,0.10)"/>
      <rect x="32" y="128" width="690" height="7" fill="rgba(137,180,250,0.12)"/>
      <rect x="20" y="170" width="820" height="8" fill="rgba(243,139,168,0.10)"/>
      <rect x="0" y="212" width="1100" height="2" fill="rgba(255,255,255,0.04)"/>
    </g>
  </g>

  <!-- BOOT -->
  <g class="boottext">
    <text x="40" y="90"  class="mono small ok     b0">[  OK  ] Started kernel event logging daemon.</text>
    <text x="40" y="112" class="mono small ok     b1">[  OK  ] Reached target System Initialization.</text>
    <text x="40" y="134" class="mono small info-c b2">[ INFO ] Loading catppuccin mocha colorscheme...</text>
    <text x="40" y="156" class="mono small ok     b3">[  OK  ] Mounted /home/blessedrebus.</text>
    <text x="40" y="178" class="mono small ok     b4">[  OK  ] Started zsh session manager.</text>
    <text x="40" y="200" class="mono small warn   b5">[ WARN ] hyprland compositor: 1 workspace restored.</text>
    <text x="40" y="222" class="mono small ok     b6">[  OK  ] Started kitty terminal emulator.</text>
    <text x="40" y="244" class="mono small info-c b7">[ INFO ] Initializing whoami profile card...</text>
    <text x="40" y="266" class="mono small ok     b8">[  OK  ] All systems operational.</text>
    <text x="40" y="300" class="mono small purple b9">         Starting blessedrebus@arch session</text>

    <g class="spinner-grp spinner-grp-out">
      <text x="262" y="300" class="mono small purple spin0">|</text>
      <text x="262" y="300" class="mono small purple spin1">/</text>
      <text x="262" y="300" class="mono small purple spin2">-</text>
      <text x="262" y="300" class="mono small purple spin3">\</text>
    </g>

    <text x="40" y="300" class="mono small ok b10">         Starting blessedrebus@arch session  [ DONE ]</text>
  </g>

  <!-- PROMPT -->
  <g class="prompt-static">
    <text x="24"  y="88" class="mono body faint">❯</text>
    <text x="46"  y="88" class="mono title white">blessedrebus@arch</text>
    <text x="210" y="88" class="mono body faint">~</text>
  </g>

  <!-- typewriter whoami -->
  <text x="226" y="88" class="mono body muted tw-w">w</text>
  <text x="233" y="88" class="mono body muted tw-h">h</text>
  <text x="240" y="88" class="mono body muted tw-o">o</text>
  <text x="247" y="88" class="mono body muted tw-a">a</text>
  <text x="254" y="88" class="mono body muted tw-m">m</text>
  <text x="261" y="88" class="mono body muted tw-i">i</text>
  <rect class="cursor" x="270" y="75" width="9" height="14" fill="#cba6f7"/>

  <!-- SYSTEM -->
  <text x="24" y="128" class="mono small muted sh-system">System</text>
  <line x1="90" y1="124" x2="1076" y2="124" class="line dl-system"/>
  <g class="r0">
    <text x="24" y="164" class="mono body blue">OS</text>
    <text x="145" y="164" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1032" y="167" text-anchor="middle" class="mono small blue">Arch Linux</text>
  </g>
  <g class="r1">
    <text x="24" y="196" class="mono body blue">Uptime</text>
    <text x="145" y="196" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1031" y="199" text-anchor="middle" class="mono small blue">Since Birth</text>
  </g>
  <g class="r2">
    <text x="24" y="228" class="mono body blue">Shell</text>
    <text x="145" y="228" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1050" y="231" text-anchor="middle" class="mono small blue">ZSH</text>
  </g>
  <g class="r3">
    <text x="24" y="260" class="mono body blue">Editor</text>
    <text x="145" y="260" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1050" y="263" text-anchor="middle" class="mono small blue">Vim</text>
  </g>
  <g class="r4">
    <text x="24" y="292" class="mono body blue">WM</text>
    <text x="145" y="292" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1038" y="295" text-anchor="middle" class="mono small blue">Hyprland</text>
  </g>
  <g class="r5">
    <text x="24" y="324" class="mono body blue">Terminal</text>
    <text x="145" y="324" class="mono small" fill="#1e2535">......................................................................................................................................</text>
    <text x="1050" y="327" text-anchor="middle" class="mono small blue">Kitty</text>
  </g>

  <!-- FOCUS -->
  <text x="24" y="366" class="mono small muted sh-focus">Focus</text>
  <line x1="76" y1="362" x2="1076" y2="362" class="line dl-focus"/>
  <g class="r6">
    <text x="24" y="398" class="mono body pink">Security</text>
    <text x="145" y="398" class="mono small" fill="#1e2535">........................................................................................................</text>
    <text x="917"  y="401" text-anchor="middle" class="mono small pink">Ethical Hacking</text>
    <text x="1029" y="401" text-anchor="middle" class="mono small pink">Red Teaming</text>
  </g>
  <g class="r7">
    <text x="24" y="430" class="mono body peach">Infrastructure</text>
    <text x="145" y="430" class="mono small" fill="#1e2535">........................................................................................................</text>
    <text x="851"  y="433" text-anchor="middle" class="mono small peach">Kubernetes</text>
    <text x="929"  y="433" text-anchor="middle" class="mono small peach">Proxmox</text>
    <text x="988"  y="433" text-anchor="middle" class="mono small peach">AWS</text>
    <text x="1046" y="433" text-anchor="middle" class="mono small peach">Azure</text>
  </g>

  <!-- OTHER -->
  <text x="24" y="474" class="mono small muted sh-other">Other</text>
  <line x1="76" y1="470" x2="1076" y2="470" class="line dl-other"/>
  <g class="r8">
    <text x="24" y="506" class="mono body purple">Certifications</text>
    <text x="145" y="506" class="mono small" fill="#1e2535">............................................................................</text>
    <text x="662"  y="509" text-anchor="middle" class="mono small purple">OSCP</text>
    <text x="738"  y="509" text-anchor="middle" class="mono small purple">Kubestronaut</text>
    <text x="864"  y="509" text-anchor="middle" class="mono small purple">AWS Security Specialist</text>
    <text x="982"  y="509" text-anchor="middle" class="mono small purple">Terraform</text>
    <text x="1051" y="509" text-anchor="middle" class="mono small purple">Cisco</text>
  </g>

  <!-- PROJECTS -->
  <text x="24" y="548" class="mono small muted sh-projects">Projects</text>
  <line x1="90" y1="544" x2="1076" y2="544" class="line dl-projects"/>
  <g class="r9">
    <text x="24" y="580" class="mono body teal">Krawl Honeypot</text>
    <text x="145" y="580" class="mono small" fill="#1e2535">...........................................................................................................................</text>
    <a xlink:href="https://github.com/BlessedRebuS/Krawl" href="https://github.com/BlessedRebuS/Krawl" target="_blank">
      <text x="989" y="583" text-anchor="middle" class="mono small cyan">BlessedRebuS/Krawl</text>
    </a>
  </g>
  <g class="r10">
    <text x="24" y="612" class="mono body teal">Kentra Framework</text>
    <text x="145" y="612" class="mono small" fill="#1e2535">...........................................................................................................................</text>
    <a xlink:href="https://github.com/BlessedRebuS/Kentra" href="https://github.com/BlessedRebuS/Kentra" target="_blank">
      <text x="985" y="615" text-anchor="middle" class="mono small cyan">BlessedRebuS/Kentra</text>
    </a>
  </g>
</svg>
