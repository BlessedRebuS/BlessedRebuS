      <text x="622" y="300" class="mono small purple spin1">⠙</text>
      <text x="622" y="300" class="mono small purple spin2">⠹</text>
      <text x="622" y="300" class="mono small purple spin3">⠸</text>
      <text x="622" y="300" class="mono small purple spin4">⠼</text>
      <text x="622" y="300" class="mono small purple spin5">⠴</text>
      <text x="622" y="300" class="mono small purple spin6">⠦</text>
      <text x="622" y="300" class="mono small purple spin7">⠧</text>
      <text x="622" y="300" class="mono small purple spin8">⠇</text>
      <text x="622" y="300" class="mono small purple spin9">⠏</text>
    </g>
    <text x="40" y="300" class="mono small ok b10">         Starting blessedrebus@arch session  [ DONE ]</text>
  </g>

  <!-- PROMPT -->
  <g class="prompt-static">
    <text x="24"  y="88" class="mono body faint">❯</text>
    <text x="46"  y="88" class="mono title uname">blessedrebus@arch</text>
    <text x="204" y="88" class="mono body faint">~</text>
