    <text x="140" y="228" class="mono small" fill="#1e2535">..............</text>
    <rect x="1024" y="216" width="52" height="22" rx="11" fill="rgba(137,180,250,0.15)"/>
    <text x="1050" y="231" text-anchor="middle" class="mono small blue">zsh</text>
  </g>
  <g class="r3">
    <text x="24" y="260" class="mono body blue">editor</text>
    <text x="140" y="260" class="mono small" fill="#1e2535">..............</text>
    <rect x="1024" y="248" width="52" height="22" rx="11" fill="rgba(137,180,250,0.15)"/>
    <text x="1050" y="263" text-anchor="middle" class="mono small blue">vim</text>
  </g>
  <g class="r4">
    <text x="24" y="292" class="mono body blue">wm</text>
    <text x="140" y="292" class="mono small" fill="#1e2535">..............</text>
    <rect x="1000" y="280" width="76" height="22" rx="11" fill="rgba(137,180,250,0.15)"/>
    <text x="1038" y="295" text-anchor="middle" class="mono small blue">hyprland</text>
  </g>
  <g class="r5">
    <text x="24" y="324" class="mono body blue">terminal</text>
    <text x="140" y="324" class="mono small" fill="#1e2535">..............</text>
    <rect x="1024" y="312" width="52" height="22" rx="11" fill="rgba(137,180,250,0.15)"/>
    <text x="1050" y="327" text-anchor="middle" class="mono small blue">kitty</text>
  </g>

  <!-- ══ FOCUS ══ -->
  <text x="24" y="366" class="mono small muted sh-focus">focus</text>
  <line x1="76" y1="362" x2="1076" y2="362" class="line dl-focus"/>

  <g class="r6">
    <text x="24" y="398" class="mono body purple">offsec</text>
    <text x="140" y="398" class="mono small" fill="#1e2535">..............</text>
    <rect x="880" y="386" width="98" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="929" y="401" text-anchor="middle" class="mono small purple">ethical hacking</text>
    <rect x="984" y="386" width="92" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="1030" y="401" text-anchor="middle" class="mono small purple">red teaming</text>
  </g>
  <g class="r7">
    <text x="24" y="430" class="mono body purple">infra</text>
    <text x="140" y="430" class="mono small" fill="#1e2535">..............</text>
    <rect x="810" y="418" width="82" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="851" y="433" text-anchor="middle" class="mono small purple">Kubernetes</text>
    <rect x="898" y="418" width="62" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="929" y="433" text-anchor="middle" class="mono small purple">Proxmox</text>
    <rect x="966" y="418" width="44" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="988" y="433" text-anchor="middle" class="mono small purple">AWS</text>
    <rect x="1016" y="418" width="60" height="22" rx="11" fill="rgba(203,166,247,0.12)"/>
    <text x="1046" y="433" text-anchor="middle" class="mono small purple">Azure</text>
  </g>

  <!-- ══ OTHER ══ -->
  <text x="24" y="474" class="mono small muted sh-other">other</text>
  <line x1="76" y1="470" x2="1076" y2="470" class="line dl-other"/>

  <g class="r8">
    <text x="24" y="506" class="mono body pink">certs</text>
    <text x="140" y="506" class="mono small" fill="#1e2535">..............</text>
    <rect x="638" y="494" width="48" height="22" rx="11" fill="rgba(243,139,168,0.12)"/>
    <text x="662" y="509" text-anchor="middle" class="mono small pink">OSCP</text>
    <rect x="692" y="494" width="92" height="22" rx="11" fill="rgba(243,139,168,0.12)"/>
    <text x="738" y="509" text-anchor="middle" class="mono small pink">Kubestronaut</text>
    <rect x="790" y="494" width="148" height="22" rx="11" fill="rgba(243,139,168,0.12)"/>
    <text x="864" y="509" text-anchor="middle" class="mono small pink">AWS Security Specialist</text>
    <rect x="944" y="494" width="76" height="22" rx="11" fill="rgba(243,139,168,0.12)"/>
    <text x="982" y="509" text-anchor="middle" class="mono small pink">Terraform</text>
    <rect x="1026" y="494" width="50" height="22" rx="11" fill="rgba(243,139,168,0.12)"/>
    <text x="1051" y="509" text-anchor="middle" class="mono small pink">Cisco</text>
  </g>

  <!-- ══ PROJECTS ══ -->
  <text x="24" y="548" class="mono small muted sh-projects">projects</text>
  <line x1="90" y1="544" x2="1076" y2="544" class="line dl-projects"/>

  <g class="r9">
    <text x="24" y="580" class="mono body teal">Krawl Honeypot</text>
    <text x="140" y="580" class="mono small" fill="#1e2535">..............</text>
    <a xlink:href="https://github.com/BlessedRebuS/Krawl" href="https://github.com/BlessedRebuS/Krawl" target="_blank">
      <rect x="902" y="568" width="174" height="22" rx="11" fill="rgba(137,220,235,0.12)"/>
      <text x="989" y="583" text-anchor="middle" class="mono small cyan">BlessedRebuS/Krawl</text>
    </a>
  </g>
  <g class="r10">
    <text x="24" y="612" class="mono body teal">Kentra Framework</text>
    <text x="140" y="612" class="mono small" fill="#1e2535">..............</text>
    <a xlink:href="https://github.com/BlessedRebuS/Kentra" href="https://github.com/BlessedRebuS/Kentra" target="_blank">
      <rect x="894" y="600" width="182" height="22" rx="11" fill="rgba(137,220,235,0.12)"/>
      <text x="985" y="615" text-anchor="middle" class="mono small cyan">BlessedRebuS/Kentra</text>
