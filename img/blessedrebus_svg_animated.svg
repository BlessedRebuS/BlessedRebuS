<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1100" height="740" viewBox="0 0 1100 740" role="img" aria-label="blessedrebus terminal profile card">
  <defs>
    <style>
      .mono { font-family: "Courier New", monospace; }
      .small { font-size: 10px; }
      .body { font-size: 12px; }
      .title { font-size: 15px; font-weight: bold; }
      .muted { fill: #6c7086; }
      .faint { fill: #45475a; }
      .blue { fill: #89b4fa; }
      .purple { fill: #cba6f7; }
      .pink { fill: #f38ba8; }
      .cyan { fill: #89dceb; }
      .teal { fill: #94e2d5; }
      .yellow { fill: #f9e2af; }
      .ok { fill: #a6e3a1; }
      .info-c { fill: #89b4fa; }
      .warn { fill: #f9e2af; }
      .line { stroke: #313244; stroke-width: 1; fill: none; }
      a { text-decoration: none; }

      /* ── cursor blink ── */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 0.9s step-end infinite; animation-delay: 7.8s; opacity: 0; }

      /* ── sweep light ── */
      @keyframes sweep {
        0%   { transform: translateY(-60px); }
        100% { transform: translateY(800px); }
      }
      .sweep { animation: sweep 5s linear infinite; animation-delay: 8s; }

      /* ── glitch on username ── */
      @keyframes glitch {
        0%,90%,100% { transform: none; opacity: 1; fill: #cba6f7; }
        91%          { transform: translateX(-3px); opacity: 0.7; fill: #f38ba8; }
        93%          { transform: translateX(3px);  opacity: 0.8; fill: #89b4fa; }
        95%          { transform: translateX(-2px); opacity: 0.6; fill: #f38ba8; }
        97%          { transform: none; opacity: 1; fill: #cba6f7; }
      }
      .uname { animation: glitch 7s ease-in-out infinite; animation-delay: 12s; fill: #cba6f7; }

      /* ── generic fade in ── */
      @keyframes fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* ── slide in from left ── */
      @keyframes slidein {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* ── divider line draw ── */
      @keyframes drawline {
        from { stroke-dashoffset: 1000; }
        to   { stroke-dashoffset: 0; }
      }

      /* ── BOOT LINES ── */
      .b0  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.1s; }
      .b1  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.35s; }
      .b2  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.6s; }
      .b3  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 0.85s; }
      .b4  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.1s; }
      .b5  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.35s; }
      .b6  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.6s; }
      .b7  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 1.85s; }
      .b8  { opacity:0; animation: fadein 0.15s forwards; animation-delay: 2.1s; }
      .b9  { opacity:0; animation: fadein 0.2s  forwards; animation-delay: 2.5s; }
      .b10 { opacity:0; animation: fadein 0.2s  forwards; animation-delay: 3.8s; }

      /* boot overlay fades out */
      @keyframes bootout {
        0%   { opacity: 1; }
        100% { opacity: 0; pointer-events: none; }
      }
      .bootbg   { animation: bootout 0.6s forwards; animation-delay: 5.8s; }
      .boottext { animation: bootout 0.5s forwards; animation-delay: 5.6s; }

      /* ── PROMPT ── */
      .prompt { opacity:0; animation: fadein 0.3s forwards; animation-delay: 6.5s; }

      /* ── SECTION HEADERS ── */
      .sh-system   { opacity:0; animation: fadein 0.3s forwards; animation-delay: 7.4s; }
      .sh-focus    { opacity:0; animation: fadein 0.3s forwards; animation-delay: 9.0s; }
      .sh-other    { opacity:0; animation: fadein 0.3s forwards; animation-delay: 9.9s; }
      .sh-projects { opacity:0; animation: fadein 0.3s forwards; animation-delay: 10.8s; }

      /* ── DIVIDER LINES ── */
      .dl-system   { stroke-dasharray:1000; stroke-dashoffset:1000; animation: drawline 0.4s forwards; animation-delay: 7.5s; }
      .dl-focus    { stroke-dasharray:1000; stroke-dashoffset:1000; animation: drawline 0.4s forwards; animation-delay: 9.1s; }
      .dl-other    { stroke-dasharray:1000; stroke-dashoffset:1000; animation: drawline 0.4s forwards; animation-delay: 10.0s; }
      .dl-projects { stroke-dasharray:1000; stroke-dashoffset:1000; animation: drawline 0.4s forwards; animation-delay: 10.9s; }

      /* ── ROWS ── */
      .r0  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 7.95s; }
      .r1  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.1s; }
      .r2  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.25s; }
      .r3  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.4s; }
      .r4  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.55s; }
      .r5  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 8.7s; }
      .r6  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 9.5s; }
      .r7  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 9.65s; }
      .r8  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 10.45s; }
      .r9  { opacity:0; animation: slidein 0.2s forwards; animation-delay: 11.25s; }
      .r10 { opacity:0; animation: slidein 0.2s forwards; animation-delay: 11.4s; }
      .r11 { opacity:0; animation: slidein 0.2s forwards; animation-delay: 11.55s; }
    </style>

    <pattern id="scanlines" x="0" y="0" width="1100" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1100" height="3" fill="transparent"/>
      <rect x="0" y="3" width="1100" height="1" fill="rgba(0,0,0,0.06)"/>
    </pattern>
    <linearGradient id="sweepgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cba6f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#cba6f7" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="1099" height="739" rx="10" fill="transparent" stroke="#313244"/>

  <!-- topbar -->
  <rect x="1" y="1" width="1098" height="43" rx="10" fill="rgba(24,24,37,0.55)"/>
  <rect x="1" y="34" width="1098" height="10" fill="rgba(24,24,37,0.55)"/>
  <line x1="1" y1="44" x2="1099" y2="44" class="line"/>
  <circle cx="21" cy="22" r="5.5" fill="#f38ba8"/>
  <circle cx="40" cy="22" r="5.5" fill="#f9e2af"/>
  <circle cx="59" cy="22" r="5.5" fill="#a6e3a1"/>
  <text x="550" y="27" text-anchor="middle" class="mono small faint">[ catppuccin mocha — whoami — 128col ]</text>

  <!-- scanline overlay -->
  <rect x="0" y="44" width="1100" height="696" fill="url(#scanlines)" pointer-events="none"/>

  <!-- sweep light -->
  <rect class="sweep" x="0" y="-60" width="1100" height="60" fill="url(#sweepgrad)" pointer-events="none"/>

  <!-- ══ BOOT SCREEN ══ -->
  <rect class="bootbg" x="1" y="44" width="1098" height="695" fill="#080b0f"/>
  <g class="boottext">
    <text x="40" y="90" class="mono small ok    b0">[  OK  ] Started kernel event logging daemon.</text>
    <text x="40" y="112" class="mono small ok    b1">[  OK  ] Reached target System Initialization.</text>
    <text x="40" y="134" class="mono small info-c b2">[ INFO ] Loading catppuccin mocha colorscheme...</text>
    <text x="40" y="156" class="mono small ok    b3">[  OK  ] Mounted /home/blessedrebus.</text>
    <text x="40" y="178" class="mono small ok    b4">[  OK  ] Started zsh session manager.</text>
    <text x="40" y="200" class="mono small warn  b5">[ WARN ] hyprland compositor: 1 workspace restored.</text>
    <text x="40" y="222" class="mono small ok    b6">[  OK  ] Started kitty terminal emulator.</text>
    <text x="40" y="244" class="mono small info-c b7">[ INFO ] Initializing whoami profile card...</text>
    <text x="40" y="266" class="mono small ok    b8">[  OK  ] All systems operational.</text>
    <text x="40" y="300" class="mono small purple b9">         Starting blessedrebus@arch session .......</text>
    <text x="40" y="300" class="mono small ok    b10">         Starting blessedrebus@arch session ....... [ DONE ]</text>
  </g>

  <!-- ══ PROMPT ══ -->
  <g class="prompt">
    <text x="24" y="88" class="mono body faint">❯</text>
    <text x="46" y="88" class="mono title uname">blessedrebus@arch</text>
    <text x="204" y="88" class="mono body faint">~</text>
    <text x="226" y="88" class="mono body muted">whoami</text>
    <rect class="cursor" x="288" y="75" width="10" height="15" fill="#cba6f7"/>
  </g>

  <!-- ══ SYSTEM ══ -->
  <text x="24" y="128" class="mono small muted sh-system">system</text>
  <line x1="90" y1="124" x2="1076" y2="124" class="line dl-system"/>

  <g class="r0">
    <text x="24" y="164" class="mono body blue">os</text>
    <text x="140" y="164" class="mono small" fill="#1e2535">..............</text>
    <rect x="988" y="152" width="88" height="22" rx="11" fill="rgba(137,180,250,0.15)"/>
    <text x="1032" y="167" text-anchor="middle" class="mono small blue">Arch Linux</text>
  </g>
  <g class="r1">
    <text x="24" y="196" class="mono body blue">uptime</text>
